{% extends "home.html" %}

{% block title %}Resume{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h1 class="mb-1">Resume</h1>
            <p class="text-muted mb-0">
                View or download my latest software engineering resume.
            </p>
        </div>

        <div class="btn-group">
            <a
                href="{{ url_for('static', filename='resume/resume.pdf') }}"
                target="_blank"
                class="btn btn-outline-primary"
            >
                Open PDF
            </a>

            <a
                href="{{ url_for('static', filename='resume/resume.pdf') }}"
                download
                class="btn btn-primary"
            >
                Download
            </a>
        </div>
    </div>

    <div class="shadow rounded border overflow-hidden">

<iframe
    class="resume-frame"
    src="{{ url_for('static', filename='resume/resume.pdf') }}"
    title="Resume">
</iframe>

    </div>

</div>

{% endblock %}
